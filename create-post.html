<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Post</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .upload-page { max-width:980px; margin:32px auto; padding:20px; background:#fff; border-radius:12px; box-shadow:0 8px 28px rgba(16,24,40,0.06); }
    .upload-form { display:flex; flex-direction:column; gap:12px; }

  </style>
  <!-- MySQL API Client -->
  <script src="coshin-api.js"></script>

</head>
<body>
  <main class="upload-page">
    <a href="account.html">← Back to Profile</a>
    <h1>Create Post</h1>
    <form id="postForm" class="upload-form">
      <input id="postTitle" placeholder="Title" required>

      <textarea id="postContent" placeholder="Write your post..." rows="6"></textarea>

      <button type="button" id="publishPostBtn">Publish</button>
    </form>
  </main>
  <script>
    document.getElementById('publishPostBtn').addEventListener('click', async ()=>{
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if(!title || !content) return alert('Please add title and content');
      
      try {
        // Upload to MySQL API if authenticated
        if (coshinAPI.isAuthenticated()) {
          await coshinAPI.createPost(title, content, true);
          alert('Post published successfully');
          window.location.href = 'account.html';
        } else {
          // Fallback to localStorage if not authenticated
          const profilePicture = localStorage.getItem('profilePicture') || './COSHIN Assets/profile silhouette 2.jpg';
          const profileData = JSON.parse(localStorage.getItem('userProfile') || '{}');
          const userName = profileData.name || 'Your Name';
          
          const arr = JSON.parse(localStorage.getItem('userPosts')||'[]');
          arr.push({ title, content, uploadDate: new Date().toLocaleString(), profilePicture, userName, likes:0, comments:0, shares:0 });
          localStorage.setItem('userPosts', JSON.stringify(arr));
          alert('Post saved locally');
          window.location.href = 'account.html';
        }
      } catch (error) {
        console.error('Post creation error:', error);
        alert('Post creation failed: ' + error.message);
      }
    });
  </script>
  <script src="title-fixer.js"></script>
</body>
</html>
