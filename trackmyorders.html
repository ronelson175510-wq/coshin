<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <script src="coshin-api.js"></script>
    <style>
        body { background-color: #f5f5f5; padding-bottom: 120px; }
        .orders-container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        /* Footer Enhancements */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid #f0f0f0;
            display: flex !important;
            justify-content: space-around !important;
            align-items: center;
            padding: 12px 0 !important;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
            z-index: 99;
            width: 100%;
        }
        .footer a {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 12px 20px !important;
            text-decoration: none !important;
            color: #0EA5E9 !important;
            transition: all 0.3s ease !important;
            border-radius: 12px !important;
            position: relative !important;
        }
        .footer a:hover {
            background-color: rgba(14, 165, 233, 0.12) !important;
            transform: translateY(-4px) scale(1.1) !important;
            color: #FF6B6B !important;
        }
        .footer a::before { display: none !important; }
        .footer-tooltip { position: static; bottom: auto; left: auto; transform: none; background: transparent; color: inherit; padding: 0; margin-top:6px; opacity:1; pointer-events:auto; font-weight:600; font-size:12px; }
        .footer-tooltip::after { display: none; }
        .footer a:hover .footer-tooltip { opacity: 1; transform: none; }
</style>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-storage-compat.js"></script>
    <!-- Your Firebase Config -->
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="orders-container">
        <h1>Track My Orders</h1>
        <p>Here you can track the status of your orders.</p>
         

    </div>
    
    <footer>
        <div class="footer">
            <a href="index.html" class="footer-link" data-page="home" title="Home"><i class="fa-solid fa-house"></i><span class="footer-tooltip">Home</span></a>
            <a href="messages.html" class="footer-link" data-page="messages" title="Messages"><i class="fa-solid fa-message"></i><span class="footer-tooltip">Messages</span></a>
            <a href="reels.html" class="footer-link" data-page="reels" title="Reels"><i class="fa-solid fa-tv"></i><span class="footer-tooltip">Reels</span></a>
            <a href="account.html" class="footer-link" data-page="account" title="Account"><i class="fa-solid fa-user"></i><span class="footer-tooltip">Account</span></a>
        </div>
    </footer>
    <script>
        // Highlight active footer link
        const currentPage = window.location.pathname.split('/').pop();
        const activeLink = document.querySelector(`.footer-link[data-page="${currentPage.replace('.html', '')}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
                 
    </script>
    
</body>
</html>
