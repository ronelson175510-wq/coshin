<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload Video</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .upload-page { max-width:980px; margin:32px auto; padding:20px; background:#fff; border-radius:12px; box-shadow:0 8px 28px rgba(16,24,40,0.06); }
    .upload-form { display:flex; flex-direction:column; gap:12px; }
    .hint { color:#556; font-size:14px }

  </style>
  <!-- MySQL API Client -->
  <script src="coshin-api.js"></script>

</head>
<body>
  <main class="upload-page">
    <a href="account.html">← Back to Profile</a>
    <h1>Upload Video</h1>
    <form id="videoForm" class="upload-form">
      <input id="videoTitle" placeholder="Title" required>

      <input id="videoUrl" placeholder="Video URL (YouTube/Vimeo or direct link)" >
      <textarea id="videoDesc" placeholder="Description (optional)" rows="4"></textarea>

      <button type="button" id="uploadVideoBtn">Upload Video</button>
      <p class="hint">Uploading large local files as base64 is not recommended — use external links for best performance.</p>
    </form>
  </main>
  <script>
    document.getElementById('uploadVideoBtn').addEventListener('click', async ()=>{
      const title = document.getElementById('videoTitle').value.trim();
      const url = document.getElementById('videoUrl').value.trim();
      const desc = document.getElementById('videoDesc').value.trim();
      if(!title) return alert('Please add a title');
      
      try {
        // Upload to MySQL API if authenticated
        if (coshinAPI.isAuthenticated()) {
          await coshinAPI.uploadVideo(title, desc, url || '', true);
          alert('Video uploaded successfully');
          window.location.href = 'account.html';
        } else {
          // Fallback to localStorage if not authenticated
          const profilePicture = localStorage.getItem('profilePicture') || './COSHIN Assets/profile silhouette 2.jpg';
          const profileData = JSON.parse(localStorage.getItem('userProfile') || '{}');
          const userName = profileData.name || 'Your Name';
          
          const arr = JSON.parse(localStorage.getItem('userVideos')||'[]');
          arr.push({ title, url, description:desc, uploadDate: new Date().toLocaleString(), profilePicture, userName, likes:0, comments:0, shares:0 });
          localStorage.setItem('userVideos', JSON.stringify(arr));
          alert('Video saved locally');
          window.location.href = 'account.html';
        }
      } catch (error) {
        console.error('Video upload error:', error);
        alert('Video upload failed: ' + error.message);
      }
    });
  </script>
  <script src="title-fixer.js"></script>
</body>
</html>
