<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - COSHIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.34;
            font-weight: 400;
            color: #1c1e21;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signup-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eef2ff;
            position: relative;
        }

        .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.25);
            margin-bottom: 12px;
        }

        .brand-pill i {
            font-size: 10px;
        }

        .COSHIN-logo {
            font-size: 44px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            color: #6b7280;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .signup-container h2 {
            color: #1f2937;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .welcome-text {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            transition: color 0.3s;
            pointer-events: none;
            z-index: 1;
        }

        .signup-container input,
        .signup-container select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9fafb;
            color: #1f2937;
        }

        .signup-container input:focus,
        .signup-container select:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .signup-container input:focus ~ .input-icon,
        .signup-container select:focus ~ .input-icon {
            color: #667eea;
        }

        .signup-container input::placeholder {
            color: #9ca3af;
        }

        .signup-container select {
            cursor: pointer;
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 50px;
        }

        .toggle-password-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
            z-index: 2;
        }

        .toggle-password-btn:hover {
            color: #667eea;
        }

        .toggle-password-btn i {
            pointer-events: none;
        }

        .password-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: -12px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .password-match {
            font-size: 12px;
            margin-top: -12px;
            margin-bottom: 12px;
            padding-left: 5px;
            min-height: 16px;
        }

        .password-match.ok {
            color: #16a34a;
        }

        .password-match.no {
            color: #dc2626;
        }

        .signup-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            display: none;
            animation: shake 0.3s;
        }

        .signup-success {
            background: #d1fae5;
            color: #059669;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #059669;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .signup-container button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-top: 10px;
        }

        .signup-container button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .signup-container button[type="submit"]:active {
            transform: translateY(0);
        }

        .signup-container button[type="submit"]:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links p {
            color: #6b7280;
            font-size: 14px;
            margin: 10px 0;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #9ca3af;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }

        .divider span {
            padding: 0 15px;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 40px 30px;
            }

            .COSHIN-logo {
                font-size: 36px;
            }

            .signup-container h2 {
                font-size: 24px;
            }
        }
    </style>
    <!-- MySQL API Client -->
    <script src="coshin-api.js"></script>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <div class="brand-pill"><i class="fa-solid fa-shield"></i> Trusted Platform</div>
            <div class="COSHIN-logo">COSHIN</div>
            <p class="logo-subtitle">Connect, Share, Inspire</p>
        </div>

        <h2>Create Account</h2>
        <p class="welcome-text">Join our community today</p>

        <div class="signup-error" id="signupError"></div>
        <div class="signup-success" id="signupSuccess"></div>

        <form id="signupForm">
            <div class="input-group">
                <input type="text" id="signupUsername" placeholder="Full Name" required>
                <i class="fa-solid fa-user input-icon"></i>
            </div>

            <div class="input-group">
                <input type="date" id="signupDob" placeholder="Date of Birth" required>
                <i class="fa-solid fa-cake-candles input-icon"></i>
            </div>

            <div class="input-group">
                <select id="signupCountry" required>
                    <option value="">Select Country</option>
                    <option value="USA">USA</option>
                    <option value="Haiti">Haiti</option>
                </select>
                <i class="fa-solid fa-earth-americas input-icon"></i>
            </div>

            <div class="input-group">
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>

            <div class="input-group password-field">
                <input type="password" id="signupPassword" placeholder="Create Password" required>
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" class="toggle-password-btn" data-target="signupPassword" title="Show password">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div class="password-hint"><i class="fa-solid fa-circle-info"></i> Password must be 8+ characters, include upper and lower case, and a special character.</div>

            <div class="input-group password-field">
                <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" class="toggle-password-btn" data-target="signupConfirmPassword" title="Show password">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div class="password-match" id="passwordMatchStatus"></div>

            <button type="submit">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
            <div class="divider"><span>or</span></div>
            <p><a href="settings.html">API Settings</a></p>
            <p><a href="termsandcontitions.html">Terms and Conditions</a></p>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupUsername = document.getElementById('signupUsername');
        const signupDob = document.getElementById('signupDob');
        const signupCountry = document.getElementById('signupCountry');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const signupConfirmPassword = document.getElementById('signupConfirmPassword');
        const passwordMatchStatus = document.getElementById('passwordMatchStatus');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');
        const togglePasswordButtons = document.querySelectorAll('.toggle-password-btn');

        togglePasswordButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);
                if (!targetInput) return;

                const icon = btn.querySelector('i');

                const isHidden = targetInput.type === 'password';
                targetInput.type = isHidden ? 'text' : 'password';

                if (icon) {
                    icon.classList.remove('fa-eye', 'fa-eye-slash');
                    icon.classList.add(isHidden ? 'fa-eye-slash' : 'fa-eye');
                }

                btn.setAttribute('title', isHidden ? 'Hide password' : 'Show password');
                btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            });
        });

        function sanitizeEmail(email) {
            return email.replace(/\./g, '_').replace(/@/g, '_at_');
        }

        function updatePasswordMatchStatus() {
            const passwordValue = signupPassword.value;
            const confirmValue = signupConfirmPassword.value;

            if (!confirmValue) {
                passwordMatchStatus.textContent = '';
                passwordMatchStatus.className = 'password-match';
                return;
            }

            if (passwordValue === confirmValue) {
                passwordMatchStatus.textContent = 'Passwords match.';
                passwordMatchStatus.className = 'password-match ok';
            } else {
                passwordMatchStatus.textContent = 'Passwords do not match.';
                passwordMatchStatus.className = 'password-match no';
            }
        }

        signupPassword.addEventListener('input', updatePasswordMatchStatus);
        signupConfirmPassword.addEventListener('input', updatePasswordMatchStatus);

        function isPasswordValid(password) {
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasSpecial = /[^A-Za-z0-9]/.test(password);
            return password.length >= 8 && hasUpper && hasLower && hasSpecial;
        }

        function calculateAge(dobString) {
            const today = new Date();
            const dob = new Date(dobString);
            let age = today.getFullYear() - dob.getFullYear();
            const monthDifference = today.getMonth() - dob.getMonth();

            if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < dob.getDate())) {
                age--;
            }

            return age;
        }

        const maxDobDate = new Date();
        maxDobDate.setFullYear(maxDobDate.getFullYear() - 13);
        signupDob.max = maxDobDate.toISOString().split('T')[0];

        signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const usernameValue = signupUsername.value.trim();
            const dobValue = signupDob.value.trim();
            const countryValue = signupCountry.value;
            const emailValue = signupEmail.value.trim();
            const passwordValue = signupPassword.value.trim();
            const confirmPasswordValue = signupConfirmPassword.value.trim();

            signupError.textContent = '';
            signupSuccess.textContent = '';
            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';

            if (!usernameValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter your full name.';
                signupError.style.display = 'block';
                return;
            }

            if (!dobValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter your date of birth.';
                signupError.style.display = 'block';
                return;
            }

            const age = calculateAge(dobValue);
            if (age < 13) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> You must be at least 13 years old to create an account.';
                signupError.style.display = 'block';
                return;
            }

            if (!countryValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please select your country.';
                signupError.style.display = 'block';
                return;
            }

            if (!emailValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter your email.';
                signupError.style.display = 'block';
                return;
            }

            if (!passwordValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter your password.';
                signupError.style.display = 'block';
                return;
            }

            if (!isPasswordValid(passwordValue)) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Password must be at least 8 characters, include 1 uppercase, 1 lowercase, and 1 special character.';
                signupError.style.display = 'block';
                return;
            }

            if (!confirmPasswordValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please confirm your password.';
                signupError.style.display = 'block';
                return;
            }

            if (passwordValue !== confirmPasswordValue) {
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Passwords do not match.';
                signupError.style.display = 'block';
                return;
            }

            try {
                // Disable submit button and show loading
                const submitBtn = signupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...';

                // MySQL API signup
                const data = await coshinAPI.signup(emailValue, passwordValue, usernameValue, dobValue, countryValue);

                // Store user directory for compatibility
                const userDirectory = JSON.parse(localStorage.getItem('userDirectory') || '[]');
                const existingEntry = userDirectory.find(user => user.email === emailValue);
                if (!existingEntry) {
                    userDirectory.unshift({
                        name: usernameValue,
                        email: emailValue,
                        profilePicture: ''
                    });
                    localStorage.setItem('userDirectory', JSON.stringify(userDirectory));
                }

                signupSuccess.innerHTML = '<i class="fa-solid fa-circle-check"></i> Account created successfully! Redirecting...';
                signupSuccess.style.display = 'block';
                signupForm.reset();
                updatePasswordMatchStatus();

                // Enforce first-time profile setup (profile picture + bio) after signup.
                localStorage.setItem('needsProfileSetup', 'true');

                setTimeout(() => {
                    window.location.href = 'profile-setup.html';
                }, 1200);
            } catch (error) {
                console.error('Signup error:', error);
                signupError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + (error.message || 'Signup failed. Please try again.');
                signupError.style.display = 'block';
                
                const submitBtn = signupForm.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        });
    </script>

</body>
</html>
